reviews:
  - date: '2026-06-03'
    rating: 3
    summary: >-
      The University of Padua has no single official developer portal, but its
      Library System (SBA) provides several verifiable, live programmatic
      surfaces. PHAIDRA offers a documented REST API with an OpenAPI definition,
      a IIIF image service, and an OAI-PMH endpoint, all returning HTTP 200. The
      EPrints-based Padua@Research and Research Data Unipd repositories expose
      live OAI-PMH 2.0 endpoints. University-wide authentication runs on
      Shibboleth/SAML SSO via the IDEM GARR federation (technical SP docs are
      public). No central institutional GitHub organization exists for the
      university as a whole; public code is in individual lab/department orgs, so
      GitHub is omitted from common properties. No endpoints were fabricated; all
      URLs below were probed live.
    endpoints:
      - url: https://www.unipd.it/en
        status: 200
        note: Official English-language website.
      - url: https://biblio.unipd.it/en
        status: 200

  - aid: university-of-padua:sso
    name: Single Sign-On (Shibboleth/SAML)
    description: >-
      The University of Padua provides centralized authentication via a
      Shibboleth-based Single Sign-On, integrated with the IDEM GARR federation
      and eduGAIN. Service Provider integration and SAML metadata parameters are
      documented for technical staff; this is institutional federated identity
      infrastructure, not a self-service public API.
    humanURL: https://asit.unipd.it/single-sign-informazioni-tecniche-service-provider
    tags: [ Authentication, SSO, SAML, Shibboleth, Identity ]
    properties:

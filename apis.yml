apis:
  - aid: university-of-padua:phaidra
    name: PHAIDRA Digital Collections REST API
    description: >-
      PHAIDRA is the University of Padua Library System's platform for the
      management, consultation, and long-term archiving of digital objects and
      collections (images, texts, books, videos). It exposes a documented REST
      API (Mojolicious/Perl) described by an OpenAPI definition, including object
      metadata endpoints such as /api/object/{pid}/index/dc. Verified live at
      time of review.
    humanURL: https://phaidra.cab.unipd.it/
    baseURL: https://phaidra.cab.unipd.it/api
    tags: [ Library, Digital Collections, REST, OpenAPI, Repository ]
    properties:
      - type: Documentation
        url: https://phaidra.cab.unipd.it/api/openapi
      - type: OpenAPI
        url: https://phaidra.cab.unipd.it/api/openapi
  - aid: university-of-padua:phaidra-iiif
    name: PHAIDRA IIIF Image API
    description: >-
      PHAIDRA serves digital images through an IIIF (International Image
      Interoperability Framework) image server, enabling standards-based deep
      zoom and image delivery for the university's digital collections.
    humanURL: https://phaidra.cab.unipd.it/
    baseURL: https://phaidra.cab.unipd.it/api/imageserver
    tags: [ IIIF, Images, Library, Digital Collections ]
    properties:
      - type: Documentation
        url: https://phaidra.cab.unipd.it/api/openapi
  - aid: university-of-padua:phaidra-oai
    name: PHAIDRA OAI-PMH
    description: >-
      OAI-PMH metadata harvesting endpoint for the PHAIDRA digital collections,
      allowing programmatic harvesting of Dublin Core and related metadata.
      Verified live (verb=Identify returns HTTP 200) at time of review.
    humanURL: https://phaidra.cab.unipd.it/
    baseURL: https://phaidra.cab.unipd.it/api/oai
    tags: [ OAI-PMH, Metadata, Library, Repository ]
    properties:
      - type: Documentation
        url: https://phaidra.cab.unipd.it/api/oai?verb=Identify
      - type: OAI-PMH
        url: https://phaidra.cab.unipd.it/api/oai?verb=Identify
  - aid: university-of-padua:padua-research-oai
    name: Padua@Research OAI-PMH
    description: >-
      Padua@Research (Padua Research Archive) is an EPrints-based institutional
      repository of the University of Padua's scientific production. It exposes an
      OAI-PMH 2.0 metadata harvesting interface; full text of some items is
      restricted to registered users. Verified live at time of review.
    humanURL: https://paduaresearch.cab.unipd.it/
    baseURL: https://paduaresearch.cab.unipd.it/cgi/oai2
    tags: [ OAI-PMH, Repository, EPrints, Research, Library ]
    properties:
      - type: Documentation
        url: https://paduaresearch.cab.unipd.it/
      - type: OAI-PMH
        url: https://paduaresearch.cab.unipd.it/cgi/oai2?verb=Identify
  - aid: university-of-padua:researchdata-oai
    name: Research Data Unipd OAI-PMH
    description: >-
      Research Data Unipd is the EPrints-based research-data archive of the
      University of Padua, supporting data discovery, sharing, and reuse using
      DataCite and Dublin Core metadata. It is an OpenAIRE content provider and is
      registered in re3data, OpenDOAR, and FAIRsharing. Exposes an OAI-PMH 2.0
      endpoint (repositoryName "Research Data Unipd"), verified live at time of
      review.
    humanURL: https://researchdata.cab.unipd.it/
    baseURL: https://researchdata.cab.unipd.it/cgi/oai2
    tags: [ OAI-PMH, Research Data, EPrints, Repository, Library ]
    properties:

---
aid: university-of-padua
name: University of Padua
description: >-
  The University of Padua (Università degli Studi di Padova) is a public research
  university in Padua, Italy, founded in 1222 and ranked #236 in the QS World
  University Rankings 2025. Its public developer/API footprint is centered on the
  University Library System (SBA) rather than a single official developer portal:
  PHAIDRA, the digital-collections platform, exposes a documented REST API
  (OpenAPI), a IIIF image service, and an OAI-PMH endpoint, while the EPrints-based
  Padua@Research and Research Data Unipd repositories provide OAI-PMH metadata
  harvesting. Authentication across university services is delivered through a
  Shibboleth/SAML Single Sign-On integrated with the IDEM GARR federation and
  eduGAIN. There is no central institutional GitHub organization for the
  university as a whole; public code lives in individual lab and department orgs.

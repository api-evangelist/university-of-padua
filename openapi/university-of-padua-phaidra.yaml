  /object/{pid}/related:
    get:
      description: This method returns all objects which are in some relation to the object specified in URL.
      parameters:
      - description: the requested object id
        in: path
        name: pid
        schema:
          required: true
          type: string
      - description: Specifies the relation which should be returned, see [relations](https://github.com/phaidra/phaidra-api/wiki/Relations)
        in: query
        name: relation
        schema:
          enum:
          - http://pcdm.org/models#hasMember
          - http://purl.org/dc/terms/references
          - http://phaidra.org/ontology/isInAdminSet
          - http://phaidra.org/XML/V1.0/relations#isBackSideOf
          - http://phaidra.univie.ac.at/XML/V1.0/relations#hasSuccessor
          - http://phaidra.org/XML/V1.0/relations#isAlternativeFormatOf
          - http://phaidra.org/XML/V1.0/relations#isAlternativeVersionOf
          - http://phaidra.org/XML/V1.0/relations#isThumbnailFor
          required: false
          type: string
      - description: nr of entries to skip (paging)
        in: query
        name: from
        schema:
          required: false
          type: number
      - description: nr of entries to return (paging)
        in: query
        name: limit
        schema:
          required: false
          type: number
      - description: 'searches for the relation in opposite direction (e.g. for `hasCollectionMember`: 0 will return a list
          of objects which are members of this object/collection, 1 will return a list of objects/collections where the object
          is a member)'
        in: query
        name: right
        schema:
          enum:
          - 0
          - 1
          required: false
          type: number
      - description: fields from the index which should be returned. Only works for `fields=dc.description`. The title field
          is returned by default. Preferred title and description fields are the English ones.
        in: query
        name: fields
        schema:
          required: false
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  alerts:
                    items:
                      properties:
                        msg:
                          type: string
                        type:
                          type: string
                      type: object
                    type: array
                  hits:
                    type: number
                  objects:
                    items:
                      properties:
                        cmodel:
                          type: string
                        pid:
                          type: string
                        title:
                          type: string
                        titles:
                          items:
                            properties:
                              lang:
                                type: string
                              text:
                                type: string
                            type: object
                          type: array
                      type: object
                    type: array
                  status:
                    type: string
                type: object
          description: The requested objects Dublin Core datastream.
        '404':
          content:
            application/json:
              schema:
                type: object
          description: object has not been found
      summary: Get related objects.
      tags:
      - relationships

        schema:
          required: true
          type: string
      requestBody:
        content:
          multipart/form-data:
            schema:
              properties:
                label:
                  description: some string (currently not used in PHAIDRA)
                  required: false
                  type: string
                lastmodifieddate:
                  description: a date in ISO format
                  required: false
                  type: string
                logmessage:
                  description: log message, string
                  required: false
                  type: string
                ownerid:
                  description: owner's username
                  required: false
                  type: string

info:
  description: Documentation of the PHAIDRA API.
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  title: PHAIDRA API
  version: '3.0'
openapi: 3.0.2
paths:
  /annotations/json2xml:
    post:
      description: Transforms the annotations JSON structure to XML (see an [example of annotation JSON structure](https://github.com/phaidra/phaidra-api/wiki/Annotations)).
      requestBody:
        content:
          multipart/form-data:
            schema:
              properties:
                metadata:
                  description: example of annotation JSON
                  properties:
                    metadata:
                      $ref: '#/components/schemas/annotations'
                  type: object
              type: object
        description: Annotations JSON
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  alerts:
                    items:
                      properties:
                        msg:
                          type: string
                        type:
                          type: string
                      type: object
                    type: array
                  annotations:
                    type: object
                type: object
          description: Annotations in XML.
      summary: Transforms annotations JSON to XML.
      tags:
      - datastream
  /annotations/json2xml_validate:
    post:
      description: 'Transforms the annotations structure from JSON to XML and validates it. '
      requestBody:
        content:
          multipart/form-data:
            schema:
              properties:
                metadata:
                  $ref: '#/components/schemas/annotations'
              type: object
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/default'
          description: annotations JSON validated.
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/default'
          description: Bad request
      summary: Validates the annotations JSON.
      tags:
      - datastream
  /annotations/validate:
    post:
      description: Validates the annotations structure in XML.
      requestBody:
        content:
          application/json:
            schema:
              properties:
                metadata:
                  properties:
                    annotations:
                      example: <ph:annotations xmlns:ph="http://phaidra.org/XML/V1.0/annotations"><ph:annotation ph:id="1"><ph:x>0.7</ph:x><ph:y>0.6</ph:y><ph:w>0.2</ph:w><ph:h>0.18</ph:h><ph:category>pigments</ph:category><ph:text>prussian
                        blue</ph:text></ph:annotation><ph:annotation ph:id="3"><ph:x>0.7</ph:x><ph:y>0.4</ph:y><ph:w>0.1</ph:w><ph:h>0.1</ph:h><ph:category>people</ph:category><ph:text>Mary</ph:text></ph:annotation><ph:annotation
                        ph:id="2"><ph:x>0.1</ph:x><ph:y>0.8</ph:y><ph:w>0.15</ph:w><ph:h>0.1</ph:h><ph:category>pigments</ph:category><ph:text>azurite</ph:text></ph:annotation></ph:annotations>
                      type: string
                  type: object
              type: object
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/default'
          description: Annotations XML validated.
      summary: Validates the annotations XML.
      tags:
      - datastream
  /annotations/xml2json:
    post:
      description: Transforms the XML annotations structure to JSON.
      requestBody:
        content:
          application/json:
            schema:
              properties:
                metadata:
                  properties:
                    annotations:
                      example: <ph:annotations xmlns:ph="http://phaidra.org/XML/V1.0/annotations"><ph:annotation ph:id=1><ph:x>0.7</ph:x><ph:y>0.6</ph:y><ph:w>0.2</ph:w><ph:h>0.18</ph:h><ph:category>pigments</ph:category><ph:text>prussian
                        blue</ph:text></ph:annotation><ph:annotation ph:id=3><ph:x>0.7</ph:x><ph:y>0.4</ph:y><ph:w>0.1</ph:w><ph:h>0.1</ph:h><ph:category>people</ph:category><ph:text>Mary</ph:text></ph:annotation><ph:annotation
                        ph:id="2"><ph:x>0.1</ph:x><ph:y>0.8</ph:y><ph:w>0.15</ph:w><ph:h>0.1</ph:h><ph:category>pigments</ph:category><ph:text>azurite</ph:text></ph:annotation></ph:annotations>
                      type: string
                  type: object
              type: object
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  alerts:
                    items:
                      properties:
                        msg:
                          type: string
                        type:
                          type: string
                      type: object
                    type: array
                  metadata:
                    $ref: '#/components/schemas/annotations'
                type: object
          description: annotations in JSON
      summary: Transforms annotations XML to JSON.
      tags:
      - datastream
  /audio/create:
    post:
      description: Creates a simple data object with internal content model cmodel:Audio. See [wiki](https://github.com/phaidra/phaidra-api/wiki/Creating-a-simple-object)
        for an example.
      requestBody:
        content:
          multipart/form-data:
            schema:
              properties:
                file:
                  format: binary
                  required: true
                  type: string
                metadata:
                  description: a structure containing metadata; refer to the [wiki](https://github.com/phaidra/phaidra-api/wiki/Creating-a-simple-object)
                    for further details
                  properties:
                    metadata:
                      properties:
                        json-ld:
                          $ref: '#/components/schemas/json-ld'
                      type: object
                  type: object
                mimetype:
                  description: 'mimetype is optional: if not provided, heuristics is used on server side'
                  example: application/json
                  required: false
                  type: string
              type: object
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  alerts:
                    items:
                      properties:
                        msg:
                          type: string
                        type:
                          type: string
                      type: object
                    type: array
                  pid:
                    type: string
                  status:
                    type: number
                type: object
          description: Audio object created
        '404':
          content:
            application/json:
              schema:
                type: object
          description: error creating object
      security:
      - basicAuth: []
      summary: Creates an audio object
      tags:
      - object-basics
  /authz/check/{pid}/{op}:
    get:
      description: Checks if the authenticated user has appropriate rights for an operation on the object (readable/writable).
        Can also be checked for unauthenticated user.
      parameters:
      - description: pid - object id
        in: path
        name: pid
        schema:
          required: false
          type: string
      - description: rights for operation
        in: path
        name: op
        schema:
          enum:
          - ro
          - rw
          required: true
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  alerts:
                    items:
                      properties:
                        msg:
                          type: string
                        type:
                          type: string
                      type: object
                    type: array
                  status:
                    type: string
                type: object
          description: readable/writable, depending on parameter 'op'. This method can be used to check if an object is readable/writable.
            The authentication is optional, as you might want to know if an object is readable for an unauthenticated user.
            An object is never writable for an unauthenticated user, so checking 'rw' only makes sense with authentication.
            Typically, an object is only writable for its owner.
        '403':
          content:
            application/json:
              schema:
                properties:
                  alerts:
                    items:
                      properties:
                        msg:
                          type: string
                        type:
                          type: string
                      type: object
                    type: array
                  status:
                    type: string
                type: object
          description: not op
      security:
      - basicAuth: []
      summary: Checks rights
      tags:
      - object-advanced
  /collection/create:
    post:
      description: Use to create collection object. The process is the same as for other simple objects (e.g. picture/create),
        just don't provide any file parameter.
      requestBody:
        content:
          multipart/form-data:
            schema:
              properties:
                metadata:
                  description: a structure containing metadata; refer to the wiki (see above) for further details. You can
                    send members - as in the example, or not, and add members later using either the collection/{pid}/members/add
                    request, or the relationships requests with the hasMember relationship.

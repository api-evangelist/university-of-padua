        metadata:
          uwmetadata:
          - children:
            - datatype: CharacterString
              input_type: input_text
              ui_value: o:454073
              xmlname: identifier
              xmlns: http://phaidra.univie.ac.at/XML/metadata/lom/V1.0
            - attributes:
              - input_type: select
                ui_value: en
                xmlname: lang
              datatype: LangString
              input_type: input_text
              ui_value: Tolerance and reward equity predict cooperation in ravens (Corvus corax)
              xmlname: title
              xmlns: http://phaidra.univie.ac.at/XML/metadata/lom/V1.0
            - datatype: Language
              input_type: select
              ui_value: en
              xmlname: language
              xmlns: http://phaidra.univie.ac.at/XML/metadata/lom/V1.0
            - attributes:
              - input_type: select
                ui_value: en
                xmlname: lang
              datatype: LangString
              input_type: input_text
              ui_value: Cooperative decision rules have so far been shown experimentally mainly in mammal species that have
                variable and complex social networks. However, these traits should not necessarily be restricted to mammals.
                Therefore, we tested cooperative problem solving in ravens. We showed that, without training, nine ravens
                spontaneously cooperated in a loose-string task. Corroborating findings in several species, ravensâ�� cooperative
                success increased with increasing inter-individual tolerance levels. Importantly, we found this in both a
                forced dyadic setting, and in a group setting where individuals had an open choice to cooperate with whomever.
                The ravens, moreover, also paid attention to the resulting reward distribution and ceased cooperation when
                being cheated upon. Nevertheless, the ravens did not seem to pay attention to the behavior of their partners
                while cooperating, and future research should reveal whether this is task specific or a general pattern. Given
                their natural propensity to cooperate and the results we present here, we consider ravens as an interesting
                model species to study the evolution of, and the mechanisms underlying cooperation.
              xmlname: description
              xmlns: http://phaidra.univie.ac.at/XML/metadata/lom/V1.0

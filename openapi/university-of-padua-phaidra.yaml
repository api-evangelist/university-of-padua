        content:
          multipart/form-data:
            schema:
              properties:
                metadata:
                  description: example of uwmetadata JSON
                  properties:
                    metadata:
                      properties:
                        uwmetadata:
                          $ref: '#/components/schemas/uwmetadata_min'
                      type: object
                  type: object
              type: object
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  alerts:
                    items:
                      properties:
                        msg:
                          type: string
                        type:
                          type: string
                      type: object
                    type: array
                  metadata:
                    properties:
                      uwmetadata:
                        type: string
                    type: object
                type: object
          description: XML uwmetadata.
      summary: Transforms uwmetadata JSON to XML.
      tags:
      - datastream
  /uwmetadata/json2xml_validate:
    post:
      description: 'Transforms uwmetadata structure from JSON to XML, then validates the uwmetadata XML. See [examples of
        uwmetadata](https://github.com/phaidra/phaidra-api/wiki/Datastream-examples). '
      requestBody:
        content:
          multipart/form-data:
            schema:
              properties:
                metadata:
                  $ref: '#/components/schemas/uwmetadata_article_basic'
              type: object
        description: JSON uwmetadata. An example of article uwmetadata in basic mode is provided.
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/default'
          description: Json uwmetadata validated.
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/default'
          description: Bad request
      summary: Validates JSON uwmetadata.
      tags:
      - datastream
  /uwmetadata/tree:
    get:
      description: Returns the uwmetadata structure with all nodes, labels, dictionaries, etc.
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  alerts:
                    items:
                      properties:
                        msg:
                          type: string
                        type:
                          type: string
                      type: object
                    type: array
                  languages:
                    type: object
                  status:
                    type: number
                  tree:
                    $ref: '#/components/schemas/uwmetadata'
                type: object
          description: Uwmetadata tree.
      summary: Get uwmetadata structure.
      tags:
      - datastream
  /uwmetadata/validate:
    post:
      description: Validates the uwmetadata structure in XML (see an [example of uwmetadata XML](https://github.com/phaidra/phaidra-api/wiki/Article-uwmetadata-in-xml-format)).
        The XML has to be sent in the request body as raw data.
      requestBody:
        content:
          text/plain:
            schema:
              description: uwmetadata XML, the XML has to be sent in the request body as raw data.
              format: binary
              type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/default'
          description: Xml uwmetadata validated.
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/default'
          description: Bad request
      summary: Validates uwmetadata XML.
      tags:
      - datastream
  /uwmetadata/xml2json:
    post:
      description: Transforms the uwmetadata structure from XML to JSON (see [examples of uwmetadata](https://github.com/phaidra/phaidra-api/wiki/Datastream-examples)).
      parameters:
      - description: mode full or basic
        in: query
        name: mode
        schema:
          default: basic
          enum:
          - full
          - basic
          required: false
          type: string
      requestBody:
        content:
          application/json:
            schema:
              properties:
                metadata:
                  properties:
                    uwmetadata:
                      example: '<ns0:uwmetadata xmlns:ns0="http://phaidra.univie.ac.at/XML/metadata/V1.0" xmlns:ns1="http://phaidra.univie.ac.at/XML/metadata/lom/V1.0"
                        xmlns:ns2="http://phaidra.univie.ac.at/XML/metadata/extended/V1.0" xmlns:ns3="http://phaidra.univie.ac.at/XML/metadata/lom/V1.0/entity"
                        xmlns:ns4="http://phaidra.univie.ac.at/XML/metadata/lom/V1.0/requirement" xmlns:ns5="http://phaidra.univie.ac.at/XML/metadata/lom/V1.0/educational"
                        xmlns:ns6="http://phaidra.univie.ac.at/XML/metadata/lom/V1.0/annotation" xmlns:ns7="http://phaidra.univie.ac.at/XML/metadata/lom/V1.0/classification"
                        xmlns:ns8="http://phaidra.univie.ac.at/XML/metadata/lom/V1.0/organization" xmlns:ns9="http://phaidra.univie.ac.at/XML/metadata/histkult/V1.0"
                        xmlns:ns10="http://phaidra.univie.ac.at/XML/metadata/provenience/V1.0" xmlns:ns11="http://phaidra.univie.ac.at/XML/metadata/provenience/V1.0/entity"
                        xmlns:ns12="http://phaidra.univie.ac.at/XML/metadata/digitalbook/V1.0" xmlns:ns13="http://phaidra.univie.ac.at/XML/metadata/etheses/V1.0">

                        <ns1:general>

                        <ns1:title language="de">Title</ns1:title>

                        <ns1:language>de</ns1:language>

                        </ns1:general>

                        <ns1:lifecycle>

                        <ns1:contribute seq="0">

                        <ns1:role>46</ns1:role>

                        <ns1:entity seq="0">

                        <ns3:firstname>Brenda</ns3:firstname>

                        <ns3:lastname>Walsh</ns3:lastname>

                        </ns1:entity>

                        </ns1:contribute>

                        </ns1:lifecycle>

                        <ns1:rights>

                        <ns1:license>1</ns1:license>

                        </ns1:rights>

                        </ns0:uwmetadata>

                        '
                      type: string
                  type: object
              type: object
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  alerts:
                    items:
                      properties:
                        msg:
                          type: string
                        type:
                          type: string
                      type: object
                    type: array
                  metadata:
                    properties:
                      uwmetadata:
                        $ref: '#/components/schemas/uwmetadata_min'
                    type: object
                type: object
          description: JSON uwmetadata.
      summary: Transforms uwmetadata XML to JSON.
      tags:
      - datastream
  /video/create:
    post:
      description: Creates a simple data object with internal content model cmodel:Video. See [wiki](https://github.com/phaidra/phaidra-api/wiki/Creating-a-simple-object)
        for an example.
      requestBody:
        content:
          multipart/form-data:
            schema:
              properties:
                file:
                  format: binary
                  required: true
                  type: string
                metadata:
                  description: a structure containing metadata; refer to the [wiki](https://github.com/phaidra/phaidra-api/wiki/Creating-a-simple-object)
                    for further details
                  properties:
                    metadata:
                      properties:
                        json-ld:
                          $ref: '#/components/schemas/json-ld'
                      type: object
                  type: object
                mimetype:
                  description: 'mimetype is optional: if not provided, heuristics is used on server side'
                  example: application/json
                  required: false
                  type: string
              type: object
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  alerts:
                    items:
                      properties:
                        msg:
                          type: string
                        type:
                          type: string
                      type: object
                    type: array
                  pid:
                    type: string
                  status:
                    type: number
                type: object
          description: Video object created
        '404':
          content:
            application/json:
              schema:
                type: object
          description: error creating object
      security:
      - basicAuth: []
      summary: Creates a video object
      tags:
      - object-basics
  /vocabulary:
    get:
      description: Get vocabulary which was saved in API in vocabulary folder.
      parameters:
      - description: vocabulary ID
        examples:
          http://id.loc.gov/vocabulary/iso639-2:
            summary: Vocabulary of languages
            value: http://id.loc.gov/vocabulary/iso639-2
          oefos2012:
            summary: OEFOS 2012 classification
            value: oefos2012
        in: query
        name: uri
        schema:
          type: string
      - description: cache
        in: query
        name: nocache
        schema:
          required: false
          type: boolean
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  alerts:
                    items:
                      properties:
                        msg:
                          type: string
                        type:
                          type: string
                      type: object
                    type: array
                  status:
                    type: number
                type: object
          description: JSON representation of the controlled vocabulary
      summary: Get controlled vocabulary
      tags:
      - vocabularies
